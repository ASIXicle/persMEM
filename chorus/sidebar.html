<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #dcdceb;
      padding: 12px;
      width: 100%;
    }

    h2 {
      font-size: 16px;
      color: #d46f1d;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .section {
      margin-bottom: 16px;
      padding: 10px;
      background: #596688;
      border-radius: 6px;
      border: 1px solid #0f3460;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #f8eee8;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #0d1d38;
      margin-bottom: 4px;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      background: #dfe9de;
      color: #310404;
      border: 1px solid #1a3a6a;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 240px;
      padding: 8px;
      background: #dfe9de;
      color: #310404;
      border: 1px solid #1a3a6a;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #533483;
      color: white;
      width: 100%;
      font-weight: 600;
      font-size: 14px;
      padding: 10px;
    }
    .btn-primary:hover { background: #6b44a0; }
    .btn-primary:disabled {
      background: #2a2a4a;
      color: #555;
      cursor: not-allowed;
    }

    .btn-small {
      background: #0f3460;
      color: #a0c4ff;
      font-size: 11px;
      padding: 4px 10px;
    }
    .btn-small:hover { background: #1a4a80; }

    .tab-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .tab-row select { flex: 1; margin-bottom: 0; }
    .tab-row .agent-label {
      font-weight: 600;
      color: #a0c4ff;
      min-width: 40px;
    }

    .status {
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
    .status.idle { background: #1a2a4a; color: #6c7a96; }
    .status.firing { background: #3a2a1a; color: #f0a040; }
    .status.complete { background: #1a3a2a; color: #2edb59; }
    .status.error { background: #3a1a1a; color: #f04040; }

    .round-display {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: #a0c4ff;
      padding: 4px;
    }

    .footer {
      font-size: 10px;
      color: #444;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <h2>&#9835; Chorus</h2>

  <!-- Tab Registration -->
  <div class="section">
    <div class="section-title">Tab Assignment</div>
    <button class="btn-small" id="btn-refresh" style="margin-bottom:8px;">
      Refresh Claude Tabs
    </button>
    <div class="tab-row">
      <span class="agent-label">Kite</span>
      <select id="sel-kite"><option value="">—</option></select>
    </div>
    <div class="tab-row">
      <span class="agent-label">Wren</span>
      <select id="sel-wren"><option value="">—</option></select>
    </div>
    <button class="btn-small" id="btn-assign" style="width:100%;">
      Assign Tabs
    </button>
  </div>

  <!-- Message Input -->
  <div class="section">
    <div class="section-title">Message</div>
    <textarea id="input-msg" placeholder="Type your prompt here..."></textarea>
  </div>

  <!-- Settings -->
  <div class="section">
    <div class="section-title">AMQ Exchange Rounds</div>
    <input type="number" id="input-rounds" value="3" min="0" max="10">
  </div>

  <!-- Fire Button -->
  <button class="btn-primary" id="btn-fire">
    &#9654; Fire Both
  </button>

  <!-- Status -->
  <div class="section" style="margin-top:12px;">
    <div class="section-title">Status</div>
    <div class="status idle" id="status">Idle</div>
    <div class="round-display" id="round-display"></div>
  </div>

  <div class="footer">Chorus v0.1 — Kite &amp; Wren</div>

  <script src="sidebar.js"></script>
</body>
</html>
